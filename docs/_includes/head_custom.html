<script>
document.addEventListener("DOMContentLoaded", function () {
  const supportedTypes = [
    "NOTE",
    "TIP",
    "IMPORTANT",
    "WARNING",
    "CAUTION"
  ];

  document
    .querySelectorAll(".main-content blockquote")
    .forEach(function (blockquote) {
      const firstParagraph = blockquote.querySelector("p");

      if (!firstParagraph) {
        return;
      }

      const expression = new RegExp(
        "^\\[!(" + supportedTypes.join("|") + ")\\]",
        "i"
      );

      const match = firstParagraph.textContent.trim().match(expression);

      if (!match) {
        return;
      }

      const alertType = match[1].toLowerCase();

      blockquote.classList.add(
        "github-alert",
        "github-alert-" + alertType
      );

      /*
       * Remove [!NOTE], [!TIP], etc. from the rendered paragraph,
       * while preserving the remaining Markdown-generated elements.
       */
      for (const node of firstParagraph.childNodes) {
        if (
          node.nodeType === Node.TEXT_NODE &&
          expression.test(node.textContent.trim())
        ) {
          node.textContent = node.textContent
            .replace(expression, "")
            .replace(/^\s+/, "");

          break;
        }
      }

      /*
       * Remove a paragraph that contained only the alert marker.
       */
      if (
        firstParagraph.textContent.trim() === "" &&
        firstParagraph.children.length === 0
      ) {
        firstParagraph.remove();
      }
    });
});
</script>
